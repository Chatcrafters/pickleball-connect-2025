{% extends "base.html" %}
{% block title %}Prize Money Login{% endblock %}
{% block content %}
<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f0f4f8;">
  <div style="background:white;border-radius:16px;padding:40px;width:100%;max-width:400px;box-shadow:0 4px 24px rgba(0,0,0,0.1);">
    <div style="text-align:center;margin-bottom:28px;">
      <div style="font-size:40px;margin-bottom:8px;">🏆</div>
      <h2 style="margin:0;color:#0D1B2A;font-size:20px;font-weight:800;">Prize Money Portal</h2>
      <div style="color:#888;font-size:13px;margin-top:4px;">WPC PCL Málaga 2026</div>
    </div>
    {% if error %}
    <div style="background:#fee2e2;color:#991b1b;border-radius:8px;padding:10px 14px;margin-bottom:16px;font-size:13px;">
      ⚠ {{ error }}
    </div>
    {% endif %}
    <form method="POST">
      <div style="margin-bottom:14px;">
        <label style="display:block;font-size:12px;font-weight:700;color:#666;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px;">Username</label>
        <input type="text" name="username" class="form-control" placeholder="wpc_admin / pcl_admin" autofocus>
      </div>
      <div style="margin-bottom:20px;">
        <label style="display:block;font-size:12px;font-weight:700;color:#666;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px;">Password</label>
        <input type="password" name="password" class="form-control" placeholder="••••••••">
      </div>
      <button type="submit" style="width:100%;padding:13px;background:#0D1B2A;color:white;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer;">
        Login →
      </button>
    </form>
    <div style="margin-top:20px;text-align:center;font-size:12px;color:#aaa;">
      Player? Use the personal link sent to you.
    </div>
  </div>
</div>
{% endblock %}
